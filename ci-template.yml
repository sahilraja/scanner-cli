# @webileapps/scan — GitLab CI template
#
# Include this in your project's .gitlab-ci.yml:
#
#   include:
#     - project: 'webileapps/ai-native-delivery/scanner'
#       ref: main
#       file: 'ci-template.yml'
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#
#   NPM_READ_TOKEN        — Deploy token with read_package_registry scope
#   GOOGLE_CHAT_WEBHOOK   — Google Chat incoming webhook URL
#   SMTP_HOST / SMTP_USER / SMTP_PASS  — SMTP credentials (or RESEND_API_KEY)
#   GITLAB_SCAN_TOKEN     — Project Access Token with read_api scope

project-health-scan:
  stage: test
  tags:
    - work-shell
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    # Install nvm if absent, then switch to Node 20.
    # On a persistent shell runner $HOME/.nvm survives between jobs,
    # so the install only runs once ever on this machine.
    - |
      export NVM_DIR="${HOME}/.nvm"
      if [ ! -s "$NVM_DIR/nvm.sh" ]; then
        echo "nvm not found — installing..."
        curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
      fi
      . "$NVM_DIR/nvm.sh"
      node_major=$(node --version 2>/dev/null | sed 's/v//' | cut -d. -f1)
      if [ -z "$node_major" ] || [ "$node_major" -lt 18 ]; then
        echo "Node ${node_major:-none} — installing Node 20..."
        nvm install 20
      fi
      nvm use 20
      echo "Runtime: Node $(node --version), npm $(npm --version)"
    # Show which notification variables are configured (values stay masked)
    - |
      echo "=== Notification variable check ==="
      [ -n "$GITLAB_SCAN_TOKEN" ]   && echo "  GITLAB_SCAN_TOKEN   : SET" || echo "  GITLAB_SCAN_TOKEN   : NOT SET (member lookup will be skipped)"
      [ -n "$GOOGLE_CHAT_WEBHOOK" ] && echo "  GOOGLE_CHAT_WEBHOOK : SET" || echo "  GOOGLE_CHAT_WEBHOOK : NOT SET (Google Chat notification will be skipped)"
      [ -n "$SMTP_HOST" ]           && echo "  SMTP_HOST           : SET" || echo "  SMTP_HOST           : NOT SET"
      [ -n "$SMTP_USER" ]           && echo "  SMTP_USER           : SET" || echo "  SMTP_USER           : NOT SET"
      [ -n "$SMTP_PASS" ]           && echo "  SMTP_PASS           : SET" || echo "  SMTP_PASS           : NOT SET"
      [ -n "$RESEND_API_KEY" ]      && echo "  RESEND_API_KEY      : SET" || echo "  RESEND_API_KEY      : NOT SET"
      [ -n "$MAIL_FROM" ]           && echo "  MAIL_FROM           : SET" || echo "  MAIL_FROM           : NOT SET"
      echo "==================================="
    # Route @webileapps packages to the private registry
    - |
      npm config set "@webileapps:registry" "https://${CI_SERVER_HOST}/api/v4/projects/857/packages/npm/"
      npm config set "//git.webileapps.com/api/v4/projects/857/packages/npm/:_authToken" "${NPM_READ_TOKEN}"
    # Install into a user-writable prefix (shell runners run without sudo)
    - export NPM_CONFIG_PREFIX="${HOME}/.npm-global"
    - export PATH="${HOME}/.npm-global/bin:${PATH}"
    - npm install -g @webileapps/scan@1.0.2 --force
  script:
    - scan . --ci --report-dir reports
  after_script:
    - |
      if [ -f reports/health-report.pdf ]; then
        echo "Health report generated: reports/health-report.pdf"
      fi
  artifacts:
    name: "health-report-${CI_PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - reports/health-report.pdf
      - reports/health-report-*.pdf
    expire_in: 30 days
    when: always
  # Allow exit code 2 (score below threshold) without blocking the pipeline.
  allow_failure: true
