# @webileapps/scan — GitLab CI template
#
# Include this in your project's .gitlab-ci.yml:
#
#   include:
#     - project: 'webileapps/ai-native-delivery/scanner'
#       ref: main
#       file: 'ci-template.yml'
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#
#   NPM_READ_TOKEN        — Deploy token with read_package_registry scope
#   GOOGLE_CHAT_WEBHOOK   — Google Chat incoming webhook URL
#   SMTP_HOST / SMTP_USER / SMTP_PASS  — SMTP credentials (or RESEND_API_KEY)
#   GITLAB_SCAN_TOKEN     — Project Access Token with read_api scope

project-health-scan:
  stage: test
  tags:
    - work-shell
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    # Shell runners may have an older system Node. Source nvm and upgrade if needed.
    - |
      export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
      [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
      node_major=$(node --version 2>/dev/null | sed 's/v//' | cut -d. -f1)
      if [ -z "$node_major" ] || [ "$node_major" -lt 18 ]; then
        echo "Node ${node_major:-none} detected — installing Node 20 via nvm"
        nvm install 20
        nvm use 20
      fi
      echo "Runtime: Node $(node --version), npm $(npm --version)"
    # Route @webileapps packages to the private registry
    - |
      npm config set "@webileapps:registry" "https://${CI_SERVER_HOST}/api/v4/projects/857/packages/npm/"
      npm config set "//git.webileapps.com/api/v4/projects/857/packages/npm/:_authToken" "${NPM_READ_TOKEN}"
    # Install into a user-writable prefix — shell runners run without sudo
    - export NPM_CONFIG_PREFIX="${HOME}/.npm-global"
    - export PATH="${HOME}/.npm-global/bin:${PATH}"
    - npm install -g @webileapps/scan
  script:
    - scan . --ci --report-dir reports
  after_script:
    - |
      if [ -f reports/health-report.pdf ]; then
        echo "Health report generated: reports/health-report.pdf"
      fi
  artifacts:
    name: "health-report-${CI_PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - reports/health-report.pdf
      - reports/health-report-*.pdf
    expire_in: 30 days
    when: always
  # Allow exit code 2 (score below threshold) without blocking the pipeline.
  allow_failure: true
  variables:
    SMTP_HOST: $SMTP_HOST
    SMTP_PORT: $SMTP_PORT
    SMTP_USER: $SMTP_USER
    SMTP_PASS: $SMTP_PASS
    RESEND_API_KEY: $RESEND_API_KEY
    GOOGLE_CHAT_WEBHOOK: $GOOGLE_CHAT_WEBHOOK
    GITLAB_TOKEN: $GITLAB_SCAN_TOKEN
